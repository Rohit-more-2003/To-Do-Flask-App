{% extends "base.html" %}

{% block main %}
<h3>Add a New Task</h3>
    <form action="{{ url_for('add_task') }}" method="post">
        <!-- Using csrf_token() is necessary for wtforms and requires a secret key to work -->
        {{ form.csrf_token() }}
        {{ form.title.label }}
        {{ form.title }}
        {{ form.submit }}
    </form>
    
{% if title %}
    <h1>{{ title }}</h1>
{% endif %}

{% endblock main %}
